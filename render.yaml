databases:
  - name: dayo-db
    plan: free
    databaseName: dayo
    user: dayo_user

services:
  - type: web
    name: dayo-app
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn Dayo_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dayo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: NODE_VERSION
        value: "20.18.3"
